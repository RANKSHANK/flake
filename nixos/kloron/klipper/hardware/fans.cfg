[fan]
pin: EBBCan:gpio13

[heater_fan hotend_fan]
pin: EBBCan:gpio14
heater: extruder
heater_temp: 70.0

[heater_fan exhaust_fan]
pin: PF8
max_power: 0.5
shutdown_speed: 0.0
kick_start_time: 0.5
heater: heater_bed,extruder
heater_temp: 50
fan_speed: 0.2

[heater_fan nevermore]
#	Exhaust fan - CNC_FAN0
pin: PF7
max_power: 1.0
shutdown_speed: 0.0
kick_start_time: 0.5
heater: heater_bed,extruder
heater_temp: 50
fan_speed: 1.0

[controller_fan controller_fan_1]
##	Hotend Fan - CNC_FAN1
pin: PF9
max_power: 1.0
kick_start_time: 0.5
fan_speed: 0.66

[heater_fan controller_fan_2]
##	Controller fan - CNC_FAN2
pin: PF6
kick_start_time: 0.5
heater: heater_bed
heater_temp: 80
fan_speed: 0.66

