[gcode_macro PID_SET_EXTRUDER]
gcode:
  {% set target = params.TARGET|default(0)|int %}

  {% if target == 280 %}
    SET_HEATER_PID HEATER=extruder KP=15.237 KI=0.868 KD=66.849
  {% elif target == 270 %}
    SET_HEATER_PID HEATER=extruder KP=15.020 KI=0.855 KD=65.992
  {% elif target == 265 %}
    SET_HEATER_PID HEATER=extruder KP=14.665 KI=0.807 KD=66.632
  {% elif target == 260 %}
    SET_HEATER_PID HEATER=extruder KP=14.447 KI=0.792 KD=65.911
  {% elif target == 250 %}
    SET_HEATER_PID HEATER=extruder KP=14.403 KI=0.794 KD=65.351
  {% else %}
    { action_respond_info("No PID setting found for extruder temp %d" % (target)) }
  {% endif %}
